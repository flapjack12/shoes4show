{% extends 'shoes4show/base.html' %}

{% block title_block %}
Login
{% endblock %}

{% block body_block %}
<h1>Login</h1>

{% if error_message %}
    <p style="color:red;">{{ error_message }}</p>
{% endif %}

<form method="post" action="{% url 'shoes4show:login' %}">
    {% csrf_token %}

    <input type="hidden" name="next" value="{{ request.GET.next }}">

    <p>
        Username:
        <input type="text" name="username" size="50">
    </p>

    <p>
        Password:
        <input type="password" name="password" size="50">
    </p>

    <input type="submit" value="Login">
</form>

<p>
    Don’t have an account?
    <a href="{% url 'shoes4show:register' %}">Register here</a>
</p>
{% endblock %}
