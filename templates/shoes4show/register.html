{% extends 'shoes4show/base.html' %}

{% block title_block %}
Register
{% endblock %}

{% block body_block %}
<h1>Create an Account</h1>

<form method="post" action="{% url 'shoes4show:register' %}" enctype="multipart/form-data">
    {% csrf_token %}
    {{ user_form.as_p }}
    {{ profile_form.as_p }}
    <input type="submit" value="Register">
</form>

<p>
    Already have an account?
    <a href="{% url 'shoes4show:login' %}">Login here</a>
</p>
{% endblock %}
