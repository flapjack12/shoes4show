<!DOCTYPE html>
{% load static %}
{% load shoes4show_template_tags %}

<html>
<head>
    <title>
        Shoes4Show -
        {% block title_block %}
            Home
        {% endblock %}
    </title>
</head>

<body>

<div>
    {% block body_block %}
    {% endblock %}
</div>

<hr>

<div>
    <ul>
        <li><a href="{% url 'shoes4show:index' %}">Home</a></li>
        <li><a href="{% url 'shoes4show:aboutus' %}">About Us</a></li>

        {% if user.is_authenticated %}
            <li><a href="{% url 'shoes4show:account' %}">Account</a></li>
            <li><a href="{% url 'shoes4show:logout' %}">Logout</a></li>
        {% else %}
            <li><a href="{% url 'shoes4show:register' %}">Register</a></li>
            <li><a href="{% url 'shoes4show:login' %}">Login</a></li>
        {% endif %}
    </ul>
</div>

</body>
</html>
